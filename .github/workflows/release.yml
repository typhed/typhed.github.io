name: Build Redirects & Deploy Pages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/label to record in the commit message (optional)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # commit regenerated dist/ back to master
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master           # commit to the BRANCH, not the detached tag
          persist-credentials: true

      - name: Resolve Release Tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          if [ -z "$TAG" ]; then
            TAG="manual-${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Dependencies
        run: python -m pip install --upgrade pip -r requirements.txt

      - name: Build GH Redirect Pages
        run: python src/build.py --output dist

      - name: Commit Generated Pages
        shell: bash
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/
          if git diff --cached --quiet; then
            echo "No changes in generated pages; skipping commit."
          else
            git commit -m "🚀 Build redirect pages for ${TAG}"
            git push origin HEAD:master
          fi

      - name: Configure GH Pages
        uses: actions/configure-pages@v5

      - name: Upload GH Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
