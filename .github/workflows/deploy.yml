name: Deploy Main Site to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; do not cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Static Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Version is read from the "packageManager" field in package.json.
      - name: Setup Package Manager (pnpm)
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build apps/web for Release
        # Public Clerk publishable key, injected from a repository Variable
        # (not a Secret, since it ships to the browser). See setup.md ->
        # "Add Login and Sign Up With Clerk".
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: pnpm --filter web build

      - name: Configure GH Pages
        uses: actions/configure-pages@v5

      # Generate the permalink redirect pages into the static export so the
      # site and its /permalink/ redirects publish together in one deploy.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: permalink/requirements.txt

      - name: Install Redirect Generator Dependencies
        run: python -m pip install --upgrade pip -r permalink/requirements.txt

      - name: Generate Permalink Redirects
        run: >-
          python permalink/src/build.py
          --config permalink/config/links.toml
          --template permalink/src/templates/redirect.jinja
          --output apps/web/out/permalink

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Artifacts
        id: deployment
        uses: actions/deploy-pages@v4
