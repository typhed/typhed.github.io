packages:
  - "apps/*"
  - "packages/*"

# Native / postinstall build scripts are opt-in. The static export does not use
# sharp (images are unoptimized) and the lint import resolver works without its
# native binary, so both are declined. @clerk/shared's postinstall only prints a
# telemetry notice (it writes no code we depend on), so it is declined too.
allowBuilds:
  '@clerk/shared': false
  sharp: false
  unrs-resolver: false
